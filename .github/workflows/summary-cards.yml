name: GitHub Profile Summary Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "45 2 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: Foysal-A-Al
          BRANCH_NAME: main
          UTC_OFFSET: 2
          EXCLUDE: ""
          AUTO_PUSH: true
