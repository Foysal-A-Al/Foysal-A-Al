name: Contribution Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: write

concurrency:
  group: contribution-snake
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate light and dark snake SVG files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Foysal-A-Al
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23818cf8&color_dots=%231e293b,%231e3a5f,%230e7490,%2367e8f9,%23f472b6
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2367e8f9

      - name: Publish snake files to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          build_dir: dist
          target_branch: output
          jekyll: false
          commit_message: "chore: refresh contribution snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
