<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
<title id="title">Abdullah Al Foysal AI and ML Researcher</title>
<desc id="desc">Animated research profile banner showing computational psychiatry, clinical AI, statistical evaluation, multimodal systems, and research engineering.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#050b18"/><stop offset=".48" stop-color="#0a1730"/><stop offset="1" stop-color="#161036"/></linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#22d3ee"/><stop offset=".46" stop-color="#818cf8"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
  <radialGradient id="orb"><stop stop-color="#67e8f9" stop-opacity=".78"/><stop offset="1" stop-color="#67e8f9" stop-opacity="0"/></radialGradient>
  <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse"><path d="M38 0H0V38" fill="none" stroke="#93c5fd" stroke-opacity=".065"/></pattern>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
  <clipPath id="clip"><rect width="1400" height="500" rx="30"/></clipPath>
</defs>
<style>
.s{font-family:Inter,Segoe UI,Arial,sans-serif}.m{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
.grid{animation:drift 28s linear infinite}.ring{transform-origin:222px 232px;animation:spin 18s linear infinite}.ring2{transform-origin:222px 232px;animation:spin 27s linear infinite reverse}
.node{animation:pulse 3.4s ease-in-out infinite}.n2{animation-delay:-.7s}.n3{animation-delay:-1.5s}.n4{animation-delay:-2.3s}
.flow{fill:none;stroke:url(#accent);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:9 15;animation:dash 10s linear infinite;filter:url(#glow)}
.wave{fill:none;stroke:url(#accent);stroke-width:3;stroke-linecap:round;stroke-dasharray:720;animation:draw 6s ease-in-out infinite}
.role{opacity:1;animation:roles 16s infinite}.r2,.r3,.r4{opacity:0}.r2{animation-delay:4s}.r3{animation-delay:8s}.r4{animation-delay:12s}
.cursor{animation:blink 1s steps(2,end) infinite}.float{animation:float 5s ease-in-out infinite}.float2{animation:float 6.2s ease-in-out infinite reverse}
.scan{animation:scan 4.5s ease-in-out infinite}.chip{fill:#09172b;stroke:#93c5fd;stroke-opacity:.18}.signal{animation:signal 2.8s ease-in-out infinite}
@keyframes drift{to{transform:translate(-38px,-38px)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pulse{0%,100%{opacity:.42;transform:scale(.92)}50%{opacity:1;transform:scale(1.09)}}@keyframes dash{to{stroke-dashoffset:-360}}@keyframes draw{0%{stroke-dashoffset:720;opacity:.16}45%,75%{stroke-dashoffset:0;opacity:1}100%{stroke-dashoffset:-720;opacity:.18}}@keyframes roles{0%,20%{opacity:1;transform:translateY(0)}25%,100%{opacity:0;transform:translateY(-8px)}}@keyframes blink{50%{opacity:0}}@keyframes float{0%,100%{transform:translateY(-5px)}50%{transform:translateY(7px)}}@keyframes scan{0%,100%{transform:translateX(-80px);opacity:0}20%,75%{opacity:.8}100%{transform:translateX(720px);opacity:0}}@keyframes signal{0%,100%{opacity:.35}50%{opacity:1}}
</style>
<g clip-path="url(#clip)">
<rect width="1400" height="500" fill="url(#bg)"/><rect class="grid" x="-38" y="-38" width="1476" height="576" fill="url(#grid)"/>
<circle cx="1170" cy="80" r="220" fill="url(#orb)" opacity=".12" filter="url(#soft)"/><circle cx="310" cy="455" r="240" fill="#8b5cf6" opacity=".08" filter="url(#soft)"/>
<rect x="0" y="0" width="9" height="500" fill="url(#accent)"/>

<!-- Identity core -->
<g transform="translate(80 76)">
  <circle cx="142" cy="156" r="105" fill="#081426" stroke="url(#accent)" stroke-width="3"/>
  <circle cx="142" cy="156" r="84" fill="none" stroke="#67e8f9" stroke-opacity=".13"/>
  <g class="ring"><ellipse cx="142" cy="156" rx="126" ry="46" fill="none" stroke="#67e8f9" stroke-opacity=".4" stroke-dasharray="6 9"/><circle cx="267" cy="156" r="7" fill="#67e8f9" filter="url(#glow)"/></g>
  <g class="ring2"><ellipse cx="142" cy="156" rx="58" ry="126" fill="none" stroke="#a78bfa" stroke-opacity=".38" stroke-dasharray="5 11"/><circle cx="142" cy="30" r="6" fill="#f472b6" filter="url(#glow)"/></g>
  <text x="142" y="143" text-anchor="middle" class="s" font-size="62" font-weight="900" fill="url(#accent)">AF</text>
  <text x="142" y="178" text-anchor="middle" class="m" font-size="13" fill="#94a3b8">HUMAN CENTERED AI</text>
  <path class="wave" d="M38 223H72l10-14 12 33 18-61 14 43 13-23 15 22 12-9 12 9h69"/>
</g>

<!-- Name and rotating role -->
<g transform="translate(365 92)">
  <text class="m" x="0" y="0" font-size="13" fill="#67e8f9" letter-spacing="3">RESEARCH PROFILE / FOYSAL-A-AL</text>
  <text class="s" x="0" y="66" font-size="54" font-weight="900" fill="#f8fafc">ABDULLAH AL FOYSAL</text>
  <rect x="1" y="82" width="630" height="4" rx="2" fill="url(#accent)"/>
  <text class="s" x="0" y="126" font-size="22" font-weight="700" fill="#cbd5e1">AI / ML RESEARCHER</text>
  <g transform="translate(0 166)">
    <rect x="0" y="-25" width="650" height="46" rx="12" class="chip"/>
    <text class="m role" x="18" y="4" font-size="16" fill="#67e8f9">Computational Psychiatry and Longitudinal Modelling</text>
    <text class="m role r2" x="18" y="4" font-size="16" fill="#a78bfa">Trustworthy Clinical AI and Multimodal Risk Forecasting</text>
    <text class="m role r3" x="18" y="4" font-size="16" fill="#f472b6">Bayesian Model Evaluation and Explainable Machine Learning</text>
    <text class="m role r4" x="18" y="4" font-size="16" fill="#22d3ee">Human Behaviour, Computer Vision and Research Engineering</text>
    <rect class="cursor" x="630" y="-11" width="3" height="18" fill="#67e8f9"/>
  </g>
  <text class="s" x="0" y="226" font-size="16" fill="#94a3b8">Building calibrated, interpretable, reproducible systems for people and healthcare.</text>
</g>

<!-- Neural research engine -->
<g transform="translate(1030 72)">
  <rect x="0" y="0" width="300" height="300" rx="24" fill="#071327" stroke="#94a3b8" stroke-opacity=".18"/>
  <text class="m" x="24" y="34" font-size="12" fill="#64748b">RESEARCH_ENGINE</text>
  <g opacity=".9">
    <path class="flow" d="M40 84C105 45 155 126 255 73M42 142C118 196 167 91 260 148M42 220C110 160 182 251 260 202M80 70L120 140L83 220M120 140L205 83L220 205"/>
    <circle class="node" cx="40" cy="84" r="9" fill="#22d3ee"/><circle class="node n2" cx="42" cy="142" r="8" fill="#818cf8"/><circle class="node n3" cx="42" cy="220" r="9" fill="#f472b6"/>
    <circle class="node n2" cx="120" cy="140" r="14" fill="#0f2944" stroke="#67e8f9" stroke-width="2"/><circle class="node n4" cx="205" cy="83" r="10" fill="#818cf8"/><circle class="node n3" cx="220" cy="205" r="12" fill="#f472b6"/><circle class="node" cx="260" cy="148" r="10" fill="#22d3ee"/>
  </g>
  <rect x="24" y="255" width="252" height="22" rx="7" fill="#0e1d34"/><rect class="scan" x="24" y="255" width="80" height="22" rx="7" fill="url(#accent)" opacity=".45"/>
  <text class="m" x="38" y="271" font-size="10" fill="#cbd5e1">GRAPH + TEMPORAL + UNCERTAINTY + XAI</text>
</g>

<!-- Bottom chips -->
<g transform="translate(365 382)">
  <g class="float"><rect class="chip" width="205" height="46" rx="14"/><circle cx="22" cy="23" r="5" fill="#22d3ee" class="signal"/><text x="38" y="28" class="s" font-size="13" font-weight="700" fill="#dbeafe">University of Genoa</text></g>
  <g transform="translate(218 0)" class="float2"><rect class="chip" width="196" height="46" rx="14"/><circle cx="22" cy="23" r="5" fill="#818cf8" class="signal"/><text x="38" y="28" class="s" font-size="13" font-weight="700" fill="#dbeafe">Casa Paganini InfoMus</text></g>
  <g transform="translate(427 0)" class="float"><rect class="chip" width="160" height="46" rx="14"/><circle cx="22" cy="23" r="5" fill="#f472b6" class="signal"/><text x="38" y="28" class="s" font-size="13" font-weight="700" fill="#dbeafe">Genoa, Italy</text></g>
  <g transform="translate(600 0)" class="float2"><rect class="chip" width="240" height="46" rx="14"/><circle cx="22" cy="23" r="5" fill="#34d399" class="signal"/><text x="38" y="28" class="s" font-size="13" font-weight="700" fill="#dbeafe">Open to PhD and research roles</text></g>
</g>
</g>
</svg>
