<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="690" viewBox="0 0 1400 690" role="img" aria-labelledby="t d"><title id="t">Flagship project laboratory</title><desc id="d">Animated overview of the main public research systems.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101f"/><stop offset="1" stop-color="#121034"/></linearGradient><linearGradient id="a"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#818cf8"/><stop offset="1" stop-color="#f472b6"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
<style>.s{font-family:Inter,Segoe UI,Arial,sans-serif}.m{font-family:ui-monospace,Consolas,monospace}.card{fill:#08162a;stroke:#94a3b8;stroke-opacity:.18}.line{fill:none;stroke:url(#a);stroke-width:2.2;stroke-dasharray:8 11;animation:d 8s linear infinite}.pulse{animation:p 3s ease-in-out infinite;filter:url(#g)}.p2{animation-delay:-1s}.p3{animation-delay:-2s}.bar{transform-origin:left;animation:b 4.5s ease-in-out infinite}.b2{animation-delay:-1.4s}.b3{animation-delay:-2.8s}.code{animation:c 5s steps(28,end) infinite}.scan{animation:scan 4s ease-in-out infinite}@keyframes d{to{stroke-dashoffset:-260}}@keyframes p{0%,100%{opacity:.45}50%{opacity:1}}@keyframes b{0%,100%{transform:scaleX(.36)}50%{transform:scaleX(1)}}@keyframes c{0%,12%{opacity:.15}35%,76%{opacity:1}100%{opacity:.25}}@keyframes scan{0%{transform:translateX(-120px);opacity:0}30%,70%{opacity:.7}100%{transform:translateX(520px);opacity:0}}</style>
<rect width="1400" height="690" rx="28" fill="url(#bg)"/><text x="60" y="58" class="s" font-size="29" font-weight="900" fill="#f8fafc">Flagship project laboratory</text><text x="60" y="88" class="m" font-size="13" fill="#94a3b8">Public systems spanning psychiatric modelling, multimodal health AI, behavioural computing, and reproducible research software</text>

<!-- Project 1 -->
<g transform="translate(60 122)"><rect class="card" width="620" height="235" rx="22"/><text x="26" y="41" class="m" font-size="11" fill="#22d3ee">01 / PSYCHIATRIC AI</text><text x="26" y="77" class="s" font-size="25" font-weight="900" fill="#f8fafc">PsychoGraph-Net</text><text x="26" y="103" class="s" font-size="14" fill="#94a3b8">Graph augmented Transformer for rapid cycling prediction</text><path class="line" d="M350 60L420 105L493 70L562 126M350 160L420 105L493 168L562 126"/><circle class="pulse" cx="350" cy="60" r="9" fill="#22d3ee"/><circle class="pulse p2" cx="350" cy="160" r="9" fill="#f472b6"/><circle class="pulse p3" cx="420" cy="105" r="13" fill="#0f2944" stroke="#67e8f9" stroke-width="2"/><circle class="pulse" cx="493" cy="70" r="9" fill="#818cf8"/><circle class="pulse p2" cx="493" cy="168" r="9" fill="#f472b6"/><circle class="pulse p3" cx="562" cy="126" r="12" fill="#22d3ee"/><text x="26" y="150" class="m" font-size="12" fill="#c4b5fd">GCN + temporal attention + Neo4j + LIME</text><rect x="26" y="176" width="270" height="7" rx="4" fill="#1e293b"/><rect class="bar" x="26" y="176" width="242" height="7" rx="4" fill="#22d3ee"/><text x="26" y="210" class="s" font-size="12" fill="#64748b">Modular PyTorch architecture, baselines, explainability, reproducibility</text></g>

<!-- Project 2 -->
<g transform="translate(720 122)"><rect class="card" width="620" height="235" rx="22"/><text x="26" y="41" class="m" font-size="11" fill="#818cf8">02 / MULTIMODAL HEALTH AI</text><text x="26" y="77" class="s" font-size="25" font-weight="900" fill="#f8fafc">NeuroFusion</text><text x="26" y="103" class="s" font-size="14" fill="#94a3b8">Uncertainty aware mental health monitoring and risk forecasting</text><g transform="translate(345 42)"><rect x="0" y="0" width="230" height="145" rx="14" fill="#0b1c32" stroke="#a78bfa" stroke-opacity=".35"/><text x="16" y="28" class="m code" font-size="11" fill="#67e8f9">POST /api/v1/predict</text><text x="16" y="54" class="m code" font-size="11" fill="#a5b4fc">calibrated_probability: 0.71</text><text x="16" y="80" class="m code" font-size="11" fill="#f9a8d4">uncertainty_interval: [0.61, 0.80]</text><text x="16" y="106" class="m code" font-size="11" fill="#86efac">abstain: false</text><rect x="14" y="119" width="196" height="11" rx="5" fill="#1e293b"/><rect class="scan" x="14" y="119" width="80" height="11" rx="5" fill="url(#a)"/></g><text x="26" y="150" class="m" font-size="12" fill="#c4b5fd">Calibration + bootstrap uncertainty + abstention</text><rect x="26" y="176" width="270" height="7" rx="4" fill="#1e293b"/><rect class="bar b2" x="26" y="176" width="252" height="7" rx="4" fill="#818cf8"/><text x="26" y="210" class="s" font-size="12" fill="#64748b">FastAPI, Streamlit, Docker, tests, CI, model and data cards</text></g>

<!-- Project 3 -->
<g transform="translate(60 390)"><rect class="card" width="620" height="235" rx="22"/><text x="26" y="41" class="m" font-size="11" fill="#f59e0b">03 / BEHAVIOURAL COMPUTER VISION</text><text x="26" y="77" class="s" font-size="21" font-weight="900" fill="#f8fafc">Optical Flow Cluster Analyzer</text><text x="26" y="103" class="s" font-size="14" fill="#94a3b8">Real time movement quality, clusterability, and visual analytics</text><g transform="translate(355 42)"><rect width="228" height="145" rx="14" fill="#0b1c32" stroke="#f59e0b" stroke-opacity=".32"/><path class="line" d="M18 105C53 32 83 126 116 62s63 83 96 7"/><circle class="pulse" cx="18" cy="105" r="6" fill="#f59e0b"/><circle class="pulse p2" cx="83" cy="92" r="6" fill="#22d3ee"/><circle class="pulse p3" cx="150" cy="86" r="6" fill="#f472b6"/><circle class="pulse" cx="212" cy="69" r="6" fill="#818cf8"/><text x="18" y="28" class="m" font-size="10" fill="#94a3b8">LIVE FLOW / CLUSTER QUALITY</text></g><text x="26" y="150" class="m" font-size="12" fill="#c4b5fd">YOLOv8 + Lucas Kanade + KMeans / DBSCAN / OPTICS</text><rect x="26" y="176" width="270" height="7" rx="4" fill="#1e293b"/><rect class="bar b3" x="26" y="176" width="225" height="7" rx="4" fill="#f59e0b"/><text x="26" y="210" class="s" font-size="12" fill="#64748b">PyQt6 GUI, threaded processing, validation, metrics, and export</text></g>

<!-- Project 4 -->
<g transform="translate(720 390)"><rect class="card" width="620" height="235" rx="22"/><text x="26" y="41" class="m" font-size="11" fill="#34d399">04 / RESEARCH SOFTWARE</text><text x="26" y="77" class="s" font-size="21" font-weight="900" fill="#f8fafc">PyEyesWeb Research Toolkit</text><text x="26" y="103" class="s" font-size="14" fill="#94a3b8">Python tools for expressive movement and statistical moment analysis</text><g transform="translate(357 44)"><rect width="225" height="142" rx="14" fill="#0b1c32" stroke="#34d399" stroke-opacity=".32"/><text x="16" y="28" class="m code" font-size="11" fill="#86efac">from pyeyesweb import Smoothness</text><text x="16" y="55" class="m code" font-size="11" fill="#67e8f9">sparc, jerk = metric(window)</text><text x="16" y="82" class="m code" font-size="11" fill="#c4b5fd">features.to_ml_pipeline()</text><rect x="16" y="105" width="190" height="7" rx="4" fill="#1e293b"/><rect class="bar b2" x="16" y="105" width="172" height="7" rx="4" fill="#34d399"/><text x="16" y="129" class="m" font-size="10" fill="#64748b">PACKAGE / DOCS / EXAMPLES</text></g><text x="26" y="150" class="m" font-size="12" fill="#c4b5fd">Kinematics + smoothness + sliding windows + integration</text><rect x="26" y="176" width="270" height="7" rx="4" fill="#1e293b"/><rect class="bar" x="26" y="176" width="238" height="7" rx="4" fill="#34d399"/><text x="26" y="210" class="s" font-size="12" fill="#64748b">Research package design, documentation, examples, and HCI pipelines</text></g>
</svg>
