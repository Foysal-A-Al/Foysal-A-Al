<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="t d">
<title id="t">Research ecosystem</title><desc id="d">Animated map of six connected research programmes surrounding trustworthy human centered AI.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101f"/><stop offset="1" stop-color="#151036"/></linearGradient><linearGradient id="a"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#818cf8"/><stop offset="1" stop-color="#f472b6"/></linearGradient><filter id="g"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrow" markerWidth="8" markerHeight="8" refX="5" refY="3" orient="auto"><path d="M0 0L6 3L0 6Z" fill="#67e8f9"/></marker></defs>
<style>.s{font-family:Inter,Segoe UI,Arial,sans-serif}.m{font-family:ui-monospace,Consolas,monospace}.path{fill:none;stroke:url(#a);stroke-width:2;stroke-dasharray:9 13;animation:d 10s linear infinite}.core{animation:p 4s ease-in-out infinite}.card{fill:#09172b;stroke:#94a3b8;stroke-opacity:.18}.dot{filter:url(#g);animation:p 3s ease-in-out infinite}.d2{animation-delay:-1s}.d3{animation-delay:-2s}.orbit{transform-origin:700px 330px;animation:r 32s linear infinite}.particle{animation:move 6s ease-in-out infinite}.p2{animation-delay:-2s}.p3{animation-delay:-4s}.bar{animation:b 4s ease-in-out infinite;transform-origin:left}.b2{animation-delay:-1.3s}.b3{animation-delay:-2.6s}@keyframes d{to{stroke-dashoffset:-330}}@keyframes p{0%,100%{opacity:.62}50%{opacity:1}}@keyframes r{to{transform:rotate(360deg)}}@keyframes move{0%,100%{opacity:.1;transform:translate(0,0)}50%{opacity:1;transform:translate(160px,-45px)}}@keyframes b{0%,100%{transform:scaleX(.45)}50%{transform:scaleX(1)}}</style>
<rect width="1400" height="620" rx="28" fill="url(#bg)"/><text x="62" y="58" class="s" font-size="29" font-weight="900" fill="#f8fafc">Research ecosystem</text><text x="62" y="88" class="m" font-size="13" fill="#94a3b8">Six programmes connected by one goal: useful, trustworthy intelligence for people</text>
<g opacity=".85"><path class="path" d="M700 320L270 185M700 320L700 145M700 320L1130 185M700 320L260 480M700 320L700 510M700 320L1140 480"/></g>
<g class="orbit"><circle cx="700" cy="95" r="5" fill="#22d3ee"/><circle cx="930" cy="320" r="5" fill="#818cf8"/><circle cx="700" cy="545" r="5" fill="#f472b6"/><circle cx="470" cy="320" r="5" fill="#22d3ee"/></g>
<g class="core"><circle cx="700" cy="320" r="118" fill="#071426" stroke="url(#a)" stroke-width="4"/><circle cx="700" cy="320" r="92" fill="none" stroke="#67e8f9" stroke-opacity=".16"/><text x="700" y="292" text-anchor="middle" class="m" font-size="13" fill="#67e8f9">CORE RESEARCH LOGIC</text><text x="700" y="329" text-anchor="middle" class="s" font-size="27" font-weight="900" fill="#f8fafc">TRUSTWORTHY</text><text x="700" y="363" text-anchor="middle" class="s" font-size="31" font-weight="900" fill="url(#a)">HUMAN AI</text></g>

<!-- Cards -->
<g transform="translate(68 120)"><rect class="card" width="400" height="134" rx="19"/><circle class="dot" cx="34" cy="34" r="10" fill="#22d3ee"/><text x="56" y="41" class="s" font-size="19" font-weight="850" fill="#f8fafc">Computational psychiatry</text><text x="24" y="76" class="m" font-size="12" fill="#a5b4fc">GNNs / Transformers / longitudinal mood dynamics</text><text x="24" y="101" class="s" font-size="13" fill="#94a3b8">Rapid cycling, treatment response, digital phenotyping</text><rect x="24" y="115" width="340" height="4" rx="2" fill="#1e293b"/><rect class="bar" x="24" y="115" width="290" height="4" rx="2" fill="#22d3ee"/></g>
<g transform="translate(500 94)"><rect class="card" width="400" height="122" rx="19"/><circle class="dot d2" cx="34" cy="34" r="10" fill="#818cf8"/><text x="56" y="41" class="s" font-size="19" font-weight="850" fill="#f8fafc">Clinical and multimodal AI</text><text x="24" y="75" class="m" font-size="12" fill="#a5b4fc">Clinical / imaging / EEG / speech / wearables</text><text x="24" y="99" class="s" font-size="13" fill="#94a3b8">Risk forecasting with uncertainty and calibration</text></g>
<g transform="translate(932 120)"><rect class="card" width="400" height="134" rx="19"/><circle class="dot d3" cx="34" cy="34" r="10" fill="#f472b6"/><text x="56" y="41" class="s" font-size="19" font-weight="850" fill="#f8fafc">Explainable and safe ML</text><text x="24" y="76" class="m" font-size="12" fill="#a5b4fc">LIME / SHAP / uncertainty / abstention</text><text x="24" y="101" class="s" font-size="13" fill="#94a3b8">Transparent decisions and explicit deployment limits</text><rect x="24" y="115" width="340" height="4" rx="2" fill="#1e293b"/><rect class="bar b2" x="24" y="115" width="276" height="4" rx="2" fill="#f472b6"/></g>
<g transform="translate(68 412)"><rect class="card" width="400" height="134" rx="19"/><circle class="dot d2" cx="34" cy="34" r="10" fill="#34d399"/><text x="56" y="41" class="s" font-size="19" font-weight="850" fill="#f8fafc">Statistical model evaluation</text><text x="24" y="76" class="m" font-size="12" fill="#a5b4fc">Bayesian tests / NHST / ROPE / repeated CV</text><text x="24" y="101" class="s" font-size="13" fill="#94a3b8">Meaningful differences, equivalence, and uncertainty</text><rect x="24" y="115" width="340" height="4" rx="2" fill="#1e293b"/><rect class="bar b3" x="24" y="115" width="310" height="4" rx="2" fill="#34d399"/></g>
<g transform="translate(500 436)"><rect class="card" width="400" height="122" rx="19"/><circle class="dot" cx="34" cy="34" r="10" fill="#f59e0b"/><text x="56" y="41" class="s" font-size="19" font-weight="850" fill="#f8fafc">Multimodal HCI and behaviour</text><text x="24" y="75" class="m" font-size="12" fill="#a5b4fc">Vision / motion / social signals / interaction</text><text x="24" y="99" class="s" font-size="13" fill="#94a3b8">Real time behavioural computing and research interfaces</text></g>
<g transform="translate(932 412)"><rect class="card" width="400" height="134" rx="19"/><circle class="dot d3" cx="34" cy="34" r="10" fill="#a78bfa"/><text x="56" y="41" class="s" font-size="19" font-weight="850" fill="#f8fafc">Research engineering and MLOps</text><text x="24" y="76" class="m" font-size="12" fill="#a5b4fc">FastAPI / Docker / CI / testing / data systems</text><text x="24" y="101" class="s" font-size="13" fill="#94a3b8">Reproducible prototypes that survive beyond notebooks</text><rect x="24" y="115" width="340" height="4" rx="2" fill="#1e293b"/><rect class="bar b2" x="24" y="115" width="296" height="4" rx="2" fill="#a78bfa"/></g>
</svg>
