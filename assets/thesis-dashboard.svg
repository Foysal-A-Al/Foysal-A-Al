<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="470" viewBox="0 0 1400 470" role="img" aria-labelledby="t d"><title id="t">Statistically sound model selection thesis dashboard</title><desc id="d">Animated summary of the 54 dataset classifier comparison using Bayesian and frequentist methods.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#06101f"/><stop offset="1" stop-color="#151036"/></linearGradient><linearGradient id="a"><stop stop-color="#22d3ee"/><stop offset=".5" stop-color="#818cf8"/><stop offset="1" stop-color="#f472b6"/></linearGradient></defs><style>.s{font-family:Inter,Segoe UI,Arial,sans-serif}.m{font-family:ui-monospace,Consolas,monospace}.card{fill:#08162a;stroke:#94a3b8;stroke-opacity:.18}.flow{fill:none;stroke:url(#a);stroke-width:2.5;stroke-dasharray:8 12;animation:d 8s linear infinite}.pulse{animation:p 3s ease-in-out infinite}.p2{animation-delay:-1s}.p3{animation-delay:-2s}.bar{transform-origin:left;animation:b 4s ease-in-out infinite}.b2{animation-delay:-1.2s}.b3{animation-delay:-2.4s}.triangle{animation:float 5s ease-in-out infinite}@keyframes d{to{stroke-dashoffset:-250}}@keyframes p{0%,100%{opacity:.45}50%{opacity:1}}@keyframes b{0%,100%{transform:scaleX(.4)}50%{transform:scaleX(1)}}@keyframes float{0%,100%{transform:translateY(-3px)}50%{transform:translateY(6px)}}</style>
<rect width="1400" height="470" rx="28" fill="url(#bg)"/><text x="60" y="58" class="s" font-size="29" font-weight="900" fill="#f8fafc">MSc thesis: statistically sound model selection</text><text x="60" y="88" class="m" font-size="13" fill="#94a3b8">From leaderboard thinking to defensible decisions about superiority, equivalence, and uncertainty</text>
<g transform="translate(60 125)"><rect class="card" width="220" height="115" rx="18"/><text x="22" y="34" class="m" font-size="11" fill="#67e8f9">BENCHMARK SCOPE</text><text x="22" y="79" class="s" font-size="42" font-weight="900" fill="#f8fafc">54</text><text x="86" y="78" class="s" font-size="16" font-weight="750" fill="#cbd5e1">datasets</text></g>
<g transform="translate(300 125)"><rect class="card" width="220" height="115" rx="18"/><text x="22" y="34" class="m" font-size="11" fill="#a78bfa">MODEL FAMILY</text><text x="22" y="79" class="s" font-size="42" font-weight="900" fill="#f8fafc">5</text><text x="56" y="78" class="s" font-size="16" font-weight="750" fill="#cbd5e1">classifiers</text></g>
<g transform="translate(540 125)"><rect class="card" width="220" height="115" rx="18"/><text x="22" y="34" class="m" font-size="11" fill="#f472b6">EVALUATION</text><text x="22" y="79" class="s" font-size="36" font-weight="900" fill="#f8fafc">10 x 10</text><text x="145" y="78" class="s" font-size="14" font-weight="750" fill="#cbd5e1">CV</text></g>
<g transform="translate(780 125)"><rect class="card" width="220" height="115" rx="18"/><text x="22" y="34" class="m" font-size="11" fill="#34d399">INFERENCE</text><text x="22" y="73" class="s" font-size="20" font-weight="900" fill="#f8fafc">NHST + BAYES</text><text x="22" y="96" class="s" font-size="12" fill="#94a3b8">correlated comparisons</text></g>
<g transform="translate(1020 125)"><rect class="card" width="320" height="115" rx="18"/><text x="22" y="34" class="m" font-size="11" fill="#f59e0b">DECISION LOGIC</text><text x="22" y="70" class="s" font-size="20" font-weight="900" fill="#f8fafc">ROPE</text><text x="86" y="70" class="s" font-size="13" fill="#cbd5e1">practical equivalence</text><rect x="22" y="88" width="270" height="7" rx="4" fill="#1e293b"/><rect class="bar b2" x="22" y="88" width="244" height="7" rx="4" fill="url(#a)"/></g>

<g transform="translate(60 285)"><rect class="card" width="1280" height="130" rx="20"/><text x="24" y="34" class="m" font-size="11" fill="#64748b">DECISION PIPELINE</text><path class="flow" d="M82 82H1180"/>
<g transform="translate(55 58)"><circle class="pulse" cx="0" cy="24" r="15" fill="#22d3ee"/><text x="0" y="70" text-anchor="middle" class="m" font-size="10" fill="#94a3b8">DATASETS</text></g>
<g transform="translate(265 58)"><circle class="pulse p2" cx="0" cy="24" r="15" fill="#818cf8"/><text x="0" y="70" text-anchor="middle" class="m" font-size="10" fill="#94a3b8">REPEATED CV</text></g>
<g transform="translate(485 58)"><circle class="pulse p3" cx="0" cy="24" r="15" fill="#f472b6"/><text x="0" y="70" text-anchor="middle" class="m" font-size="10" fill="#94a3b8">DIFFERENCES</text></g>
<g transform="translate(705 58)"><circle class="pulse" cx="0" cy="24" r="15" fill="#34d399"/><text x="0" y="70" text-anchor="middle" class="m" font-size="10" fill="#94a3b8">POSTERIOR</text></g>
<g transform="translate(925 58)"><circle class="pulse p2" cx="0" cy="24" r="15" fill="#f59e0b"/><text x="0" y="70" text-anchor="middle" class="m" font-size="10" fill="#94a3b8">ROPE</text></g>
<g class="triangle" transform="translate(1130 34)"><path d="M0 74L53 0l53 74Z" fill="#0c2137" stroke="url(#a)" stroke-width="2"/><circle cx="54" cy="46" r="8" fill="#67e8f9"/><text x="54" y="95" text-anchor="middle" class="m" font-size="10" fill="#94a3b8">DECISION</text></g></g>
</svg>
